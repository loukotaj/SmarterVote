name: Deploy Infrastructure

on:
  workflow_run:
    workflows: ["CI - Quality Gates"]
    types:
      - completed
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev/staging/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - staging
        - prod
      action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply
        - rollback

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  ACTION: ${{ github.event.inputs.action || 'apply' }}
  TF_VAR_app_version: ${{ github.sha }}

jobs:
  build-containers:
    name: Build Container Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      matrix:
        container:
          - name: pipeline-client
            dockerfile: pipeline_client/Dockerfile
            context: .
          - name: races-api
            dockerfile: services/races-api/Dockerfile
            context: .
    steps:
    - uses: actions/checkout@v6

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      if: env.ACTION == 'apply' || github.event_name != 'workflow_dispatch'
      run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

    - name: Ensure Artifact Registry repository exists
      if: env.ACTION == 'apply' || github.event_name != 'workflow_dispatch'
      run: |
        if ! gcloud artifacts repositories describe smartervote-${{ env.ENVIRONMENT }} \
             --location=${{ env.REGION }} --project=${{ env.PROJECT_ID }} > /dev/null 2>&1; then
          echo "Creating Artifact Registry repository smartervote-${{ env.ENVIRONMENT }}..."
          gcloud artifacts repositories create smartervote-${{ env.ENVIRONMENT }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="SmarterVote container images for ${{ env.ENVIRONMENT }} environment"
        else
          echo "Artifact Registry repository smartervote-${{ env.ENVIRONMENT }} already exists."
        fi

    - name: Build and Push ${{ matrix.container.name }}
      if: env.ACTION == 'apply' || github.event_name != 'workflow_dispatch'
      run: |
        docker build -f ${{ matrix.container.dockerfile }} \
                     -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/smartervote-${{ env.ENVIRONMENT }}/${{ matrix.container.name }}:${{ github.sha }} \
                     -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/smartervote-${{ env.ENVIRONMENT }}/${{ matrix.container.name }}:latest \
                     ${{ matrix.container.context }}
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/smartervote-${{ env.ENVIRONMENT }}/${{ matrix.container.name }}:${{ github.sha }}
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/smartervote-${{ env.ENVIRONMENT }}/${{ matrix.container.name }}:latest

  deploy-terraform:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-containers
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    # Pass all Terraform variables as TF_VAR_* env vars to avoid writing secrets into a
    # shell heredoc (backticks/special chars in secret values cause bad-substitution errors).
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_region: us-central1
      TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
      TF_VAR_app_version: ${{ github.sha }}
      TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_serper_api_key: ${{ secrets.SERPER_API_KEY }}
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      TF_VAR_xai_api_key: ${{ secrets.XAI_API_KEY }}
      TF_VAR_admin_api_key: ${{ secrets.ADMIN_API_KEY }}
      TF_VAR_auth0_domain: ${{ secrets.AUTH0_DOMAIN }}
      TF_VAR_auth0_audience: ${{ secrets.AUTH0_AUDIENCE }}

    steps:
    - uses: actions/checkout@v6

    - name: Validate required secrets
      run: |
        MISSING=()
        [ -z "${{ secrets.GCP_PROJECT_ID }}" ]    && MISSING+=("GCP_PROJECT_ID")
        [ -z "${{ secrets.GCP_SA_KEY }}" ]         && MISSING+=("GCP_SA_KEY")
        [ -z "${{ secrets.OPENAI_API_KEY }}" ]     && MISSING+=("OPENAI_API_KEY")
        [ -z "${{ secrets.SERPER_API_KEY }}" ]     && MISSING+=("SERPER_API_KEY")
        [ -z "${{ secrets.AUTH0_DOMAIN }}" ]        && MISSING+=("AUTH0_DOMAIN")
        [ -z "${{ secrets.AUTH0_AUDIENCE }}" ]      && MISSING+=("AUTH0_AUDIENCE")

        if [ ${#MISSING[@]} -ne 0 ]; then
          echo "::error::Required GitHub secrets are missing: ${MISSING[*]}"
          echo "These secrets must be set in GitHub repo settings before deploying."
          echo "Missing secrets would cause Cloud Run services to start without"
          echo "required env vars, leading to silent fallbacks or crashes."
          exit 1
        fi
        echo "✅ All required secrets are configured"

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.9.0

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Sync API keys to Secret Manager
      if: env.ACTION == 'apply' || github.event_name != 'workflow_dispatch'
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
      run: |
        sync_secret() {
          local name="$1"
          local value="$2"
          if [ -z "$value" ]; then
            echo "Skipping $name (not set)"
            return
          fi
          # Get the current latest value and compare
          current=$(gcloud secrets versions access latest --secret="$name" --project=${{ env.PROJECT_ID }} 2>/dev/null || echo "")
          if [ "$current" = "$value" ]; then
            echo "$name is already up to date"
          else
            echo "Updating $name..."
            echo -n "$value" | gcloud secrets versions add "$name" --data-file=- --project=${{ env.PROJECT_ID }}
          fi
        }
        sync_secret "openai-api-key-${{ env.ENVIRONMENT }}"   "$OPENAI_API_KEY"
        sync_secret "serper-api-key-${{ env.ENVIRONMENT }}"   "$SERPER_API_KEY"
        sync_secret "anthropic-api-key-${{ env.ENVIRONMENT }}" "$ANTHROPIC_API_KEY"
        sync_secret "gemini-api-key-${{ env.ENVIRONMENT }}"   "$GEMINI_API_KEY"
        sync_secret "xai-api-key-${{ env.ENVIRONMENT }}"      "$XAI_API_KEY"

    - name: Check if state bucket exists
      run: |
        if ! gsutil ls -b gs://smartervote-terraform-state >/dev/null 2>&1; then
          echo "Creating Terraform state bucket..."
          gsutil mb -p ${{ env.PROJECT_ID }} -l ${{ env.REGION }} gs://smartervote-terraform-state
          gsutil versioning set on gs://smartervote-terraform-state
        fi

    - name: Diagnose IAM identity and permissions
      run: |
        echo "=== Active identity ==="
        gcloud auth list

        ACTIVE=$(gcloud auth list --filter=status:ACTIVE --format="value(account)")
        echo "Active account: $ACTIVE"

        echo ""
        echo "=== IAM roles bound to active account ==="
        gcloud projects get-iam-policy ${{ env.PROJECT_ID }} \
          --flatten="bindings[].members" \
          --filter="bindings.members:$ACTIVE" \
          --format="table(bindings.role)"

    - name: Terraform Init
      run: |
        cd infra
        terraform init -reconfigure

    - name: Store Current State (for rollback)
      if: env.ACTION == 'apply' && github.ref == 'refs/heads/main'
      run: |
        cd infra
        if [ -f "terraform.tfstate" ]; then
          BACKUP_FILE="terraform-state-backup-$(date +%Y%m%d-%H%M%S).json"
          terraform show -json > "../$BACKUP_FILE"
          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV
        fi

    - name: Terraform Validate
      run: |
        cd infra
        terraform validate

    - name: Terraform Plan
      if: env.ACTION != 'rollback'
      run: |
        cd infra
        terraform plan -out=tfplan
        terraform show -json tfplan > ../terraform-plan.json

    - name: Upload Plan Artifact
      if: env.ACTION == 'plan'
      uses: actions/upload-artifact@v7
      with:
        name: terraform-plan-${{ env.ENVIRONMENT }}
        path: terraform-plan.json
        retention-days: 30

    - name: Terraform Apply with Failure Handling
      if: env.ACTION == 'apply' && github.ref == 'refs/heads/main'
      run: |
        cd infra
        set +e  # Don't exit on error
        terraform apply -auto-approve tfplan
        APPLY_EXIT_CODE=$?

        if [ $APPLY_EXIT_CODE -ne 0 ]; then
          echo "❌ Terraform apply failed! Attempting rollback..."

          # Try to rollback to previous commit
          PREV_COMMIT=$(git log --oneline -n 2 --format="%H" -- . | tail -n 1)

          echo "🔄 Rolling back to commit: $PREV_COMMIT"
          git checkout $PREV_COMMIT -- .
          terraform init -reconfigure
          terraform plan -out=rollback-plan
          terraform apply -auto-approve rollback-plan

          echo "::error::Terraform apply failed and rollback attempted"
          exit 1
        fi

    - name: Manual Rollback
      if: env.ACTION == 'rollback'
      run: |
        cd infra
        echo "🔄 Performing manual rollback..."
        PREV_COMMIT=$(git log --oneline -n 2 --format="%H" -- . | tail -n 1)
        git checkout $PREV_COMMIT -- .
        terraform init -reconfigure
        terraform plan -out=rollback-plan
        terraform apply -auto-approve rollback-plan

    - name: Upload State Backup
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: terraform-state-backup-${{ env.ENVIRONMENT }}-${{ github.sha }}
        path: terraform-state-backup-*.json
        retention-days: 30
        if-no-files-found: ignore

    - name: Output Infrastructure Summary
      if: always()
      run: |
        cd infra
        echo "## 🚀 SmarterVote Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Action**: ${{ env.ACTION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Project**: ${{ env.PROJECT_ID }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Region**: ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ env.TF_VAR_app_version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Timestamp**: $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "${{ env.ACTION }}" = "apply" ] || [ "${{ env.ACTION }}" = "rollback" ]; then
          echo "### 📋 Infrastructure Outputs" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: \(.value.value)"' >> $GITHUB_STEP_SUMMARY || echo "- No outputs available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- [GCP Console](https://console.cloud.google.com/home/dashboard?project=${{ env.PROJECT_ID }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Cloud Run Services](https://console.cloud.google.com/run?project=${{ env.PROJECT_ID }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Storage Buckets](https://console.cloud.google.com/storage/browser?project=${{ env.PROJECT_ID }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Terraform State](https://console.cloud.google.com/storage/browser/smartervote-terraform-state?project=${{ env.PROJECT_ID }})" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Clean up secrets
      run: |
        cd infra
        rm -f github-actions.tfvars
