name: Pipeline Tests

# Run manually or on schedule
on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Mondays at 2 AM UTC

jobs:
  test-pipeline:
    name: Test Pipeline Agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pipeline_client/backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r pipeline_client/backend/requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Run pipeline tests
      run: |
        PYTHONPATH=. python -m pytest tests/test_pipeline.py -v --tb=short

    - name: Test summary
      run: |
        echo "✅ Pipeline tests completed"
        echo "🧪 Agent loop, prompts, JSON extraction, multi-phase orchestration tested"
