name: Pipeline V2 Tests

# Run manually or on schedule
on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Mondays at 2 AM UTC

jobs:
  test-pipeline-v2:
    name: Test Pipeline V2 Agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('pipeline_client/backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r pipeline_client/backend/requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Run pipeline V2 tests
      run: |
        PYTHONPATH=. python -m pytest tests/test_pipeline_v2.py -v --tb=short

    - name: Test summary
      run: |
        echo "✅ Pipeline V2 tests completed"
        echo "🧪 Agent loop, prompts, JSON extraction, multi-phase orchestration tested"
